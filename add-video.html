<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeeSearch - 添加视频</title>
    <link rel="stylesheet" href="style.css">

<body>
    <div class="red-shift"></div>
    
    <!-- 主要内容区域 -->
    <main class="main-content">
        <!-- 标题部分 -->
        <div class="container">
            <header>
                <h1><a href="index.html" style="text-decoration:none;color:inherit;">ＧＥＥＳＥＡＲＣＨ</a></h1>
                <p class="subtitle">添加视频</p>
            </header>
        </div>
        
        <!-- 添加视频表单 -->
        <div class="container">
            <div class="add-video-section">
                <div class="form-group">
                    <label>视频信息（支持粘贴JSON或手动填写）</label>
                    <div class="video-info-inputs">
                        <div class="input-row">
                            <label>BV号（必填）：</label>
                            <input type="text" id="bvidInput" placeholder="例如：BV1YZqkBPEKF">
                        </div>
                        <div class="input-row">
                            <label>标题：</label>
                            <input type="text" id="titleInput" placeholder="视频标题">
                        </div>
                        <div class="input-row">
                            <label>作者：</label>
                            <input type="text" id="authorInput" placeholder="UP主名称">
                        </div>
                        <div class="input-row">
                            <label>封面：</label>
                            <input type="text" id="picInput" placeholder="封面图片URL">
                        </div>
                        <div class="input-row">
                            <label>描述：</label>
                            <textarea id="descriptionInput" rows="3" placeholder="视频描述"></textarea>
                        </div>
                        <div class="input-row">
                            <label>时长：</label>
                            <input type="text" id="lengthInput" placeholder="例如：659:26">
                        </div>
                        <div class="input-row">
                            <label>发布时间：</label>
                            <input type="datetime-local" id="createdInput" placeholder="发布时间">
                        </div>
                    </div>
                    <div class="json-input-section">
                        <textarea id="videoInfo" placeholder="或粘贴视频JSON信息（包含vlist中的视频数据）" rows="5"></textarea>
                        <button id="parseVideoBtn" class="btn-secondary">从JSON解析</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="videoKeywords">关键词信息（支持粘贴笔记）</label>
                    <textarea id="videoKeywords" placeholder="粘贴笔记内容，自动识别关键词（格式：关键词：分类）" rows="5"></textarea>
                    <button id="parseKeywordsBtn" class="btn-secondary">解析关键词</button>
                </div>
                
                <div class="form-group">
                    <label>关键词列表</label>
                    <div class="keywords-editor" id="keywordsEditor">
                        <div class="keywords-input-group">
                            <div style="position: relative; display: inline-block;">
                                <input type="text" id="newKeywordInput" placeholder="输入新关键词">
                                <div id="keywordSuggestions" class="keyword-suggestions"></div>
                            </div>
                            <select id="newKeywordCategory">
                                <option value="嘉宾">嘉宾</option>
                                <option value="游戏">游戏</option>
                                <option value="其他">其他</option>
                            </select>
                            <button id="addKeywordBtn" class="btn-add">+</button>
                        </div>
                        <div class="keywords-list" id="keywordsList">
                            <!-- 关键词列表将在这里显示 -->
                        </div>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button id="saveBtn" class="btn-primary">保存视频</button>
                    <button id="cancelBtn" class="btn-secondary">取消</button>
                </div>
            </div>
        </div>
    </main>
