<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeeSearch - 关键词管理</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="red-shift"></div>
    
    <!-- 主要内容区域 -->
    <main class="main-content">
        <!-- 标题部分 -->
        <div class="container">
            <header>
                <h1><a href="/" style="text-decoration:none;color:inherit;">ＧＥＥＳＥＡＲＣＨ</a></h1>
                <p class="subtitle">关键词管理</p>
            </header>
        </div>
        
        <!-- 关键词管理区域 -->
        <div class="container">
            <div class="keyword-admin-section">
                <div class="form-group">
                    <label>添加关键词</label>
                    <div class="keyword-input-group">
                        <input type="text" id="keywordInput" placeholder="输入关键词">
                        <select id="categoryInput">
                            <option value="游戏">游戏</option>
                            <option value="嘉宾">嘉宾</option>
                            <option value="其他">其他</option>
                        </select>
                        <input type="text" id="descriptionInput" placeholder="描述（可选）">
                        <button id="addKeywordBtn" class="btn-add">添加</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>关键词列表</label>
                    <div class="keyword-filter">
                        <select id="filterCategory">
                            <option value="">全部</option>
                            <option value="游戏">游戏</option>
                            <option value="嘉宾">嘉宾</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="keywords-list" id="keywordsList">
                        <!-- 关键词列表将在这里显示 -->
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- 编辑同义词模态框 -->
    <div id="editSynonymModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); z-index: 10000;">
        <div class="modal-content" style="background-color: rgba(20, 20, 20, 0.95); border: 2px solid #fd2d5c; border-radius: 8px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; display: flex; flex-direction: column; margin: 50px auto;">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #fd2d5c; margin: 0; font-family: 'Pixel', monospace;">编辑同义词</h3>
                <button id="closeSynonymModal" style="background: none; border: none; color: #666; font-size: 24px; cursor: pointer;">×</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 16px;">
                    <label style="color: #fff; display: block; margin-bottom: 8px;">当前关键词：</label>
                    <div id="synonymCurrentKeyword" style="color: #fd2d5c; font-size: 18px; font-family: 'Pixel', monospace; font-weight: bold;"></div>
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="color: #fff; display: block; margin-bottom: 8px;">搜索并添加同义词：</label>
                    <div style="display: flex; gap: 8px; position: relative;">
                        <input type="text" id="synonymSearch" placeholder="搜索关键词..." style="flex: 1; padding: 8px 12px; background-color: rgba(255, 255, 255, 0.1); border: 1px solid #333; color: #fff; border-radius: 4px; font-family: 'Pixel', monospace;">
                        <button id="addSynonymBtn" style="padding: 8px 16px; background-color: #fd2d5c; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: 'Pixel', monospace;">添加</button>
                    </div>
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="color: #fff; display: block; margin-bottom: 8px;">所有同义词：</label>
                    <div id="synonymList" style="display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; padding: 12px; background-color: rgba(255, 255, 255, 0.05); border-radius: 4px;">
                    </div>
                </div>
                <div style="display: flex; gap: 8px; justify-content: flex-end;">
                    <button id="cancelSynonymBtn" style="padding: 8px 16px; background-color: #333; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: 'Pixel', monospace;">取消</button>
                    <button id="saveSynonymBtn" style="padding: 8px 16px; background-color: #fd2d5c; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: 'Pixel', monospace;">保存</button>
                </div>
            </div>
        </div>
    </div>
